name: Close release
on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Version type after release
        required: true
        type: choice
        default: "patch"
        options:
          - rc
          - patch
          - minor
          - major
concurrency:
  group: release
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  build-binaries:
    name: Binary ${{ matrix.architecture }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: x86_64-linux
            runner: depot-ubuntu-24.04-4
            build_command: nix build -L .#binary-hopli-x86_64-linux
          - architecture: aarch64-linux
            runner: depot-ubuntu-24.04-arm-4
            build_command: nix build -L .#binary-hopli-aarch64-linux
          - architecture: aarch64-darwin
            runner: depot-macos-15
            build_command: nix build -L .#binary-hopli-aarch64-darwin
    uses: hoprnet/hopr-workflows/.github/workflows/build-binaries.yaml@fa71078959cf9f892185e8df16551720693a2cd1 # 0.9.3
    permissions:
      contents: read
      id-token: write
    with:
      source_branch: ${{ github.ref }}
      version_type: release
      architecture: ${{ matrix.architecture }}
      build_command: ${{ matrix.build_command }}
      binary: hopli
      runner: ${{ matrix.runner }}
      timeout_minutes: 120
    secrets:
      cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      gpg_private_key: ${{ secrets.GPG_HOPRNET_PRIVATE_KEY }}
  build-docker:
    name: Docker
    needs: build-binaries
    uses: hoprnet/hopr-workflows/.github/workflows/build-docker.yaml@fa71078959cf9f892185e8df16551720693a2cd1 # 0.9.3
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    with:
      source_branch: ${{ github.ref_name }}
      version_type: release
      build_matrix: >-
        [

          {
            "runner": "depot-ubuntu-24.04-4",
            "architecture": "x86_64-linux",
            "build_command": "nix build -L .#docker-hopli-x86_64-linux"
          },
          {
            "runner": "depot-ubuntu-24.04-arm-4",
            "architecture": "aarch64-linux",
            "build_command": "nix build -L .#docker-hopli-aarch64-linux"
          }
        ]
      cachix_cache_name: hopli
      docker_image_name: hopli
      docker_image_format: skopeo
      fail_on_scan_vulnerabilities: ${{ vars.FAIL_ON_SCAN_VULNERABILITIES }}
    secrets:
      cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
  release:
    name: Close release
    needs:
      - build-binaries
      - build-docker
    runs-on: depot-ubuntu-24.04
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Release version
        uses: hoprnet/hopr-workflows/actions/release-version@fd29bf3c58b72faacc300e068a05b59eb3b180bc # 0.9.4
        with:
          source_branch: ${{ github.ref_name }}
          release_type: ${{ inputs.release_type }}
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          zulip_api_key: ${{ secrets.ZULIP_API_KEY }}
          zulip_email: ${{ secrets.ZULIP_EMAIL }}
          zulip_channel: Hoprd
          zulip_topic: Releases
          gcp_artifact_package: hopli
          github_app_private_key: ${{ secrets.GH_APP_HOPRNET_BOT_PRIVATE_KEY }}
