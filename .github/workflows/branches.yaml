---
name: Branches

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: branches-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  coverage:
    name: Coverage
    uses: hoprnet/hopr-workflows/.github/workflows/tests.yaml@798d791de5c5485c3043049781dfd0938539a36a # workflow-tests-v6
    with:
      source_branch: ${{ github.ref_name }}
      enable_unit_tests: false
      enable_integration_tests: false
      enable_unit_coverage: true
      unit_coverage_command: "nix develop .#coverage -c cargo llvm-cov --workspace --lib --lcov --output-path coverage.lcov"
      runner_unit: depot-ubuntu-24.04-4
    secrets:
      cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
